<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0e0f13;
}

.login-box{
    width:400px;
    background:#16181f;
    padding:40px;
    border-radius:20px;
    box-shadow:0 0 30px rgba(0,0,0,.4);
}

.logo{
    text-align:center;
    font-size:32px;
    font-weight:700;
    color:white;
    margin-bottom:30px;
}

.logo span{
    color:#8b5cf6;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    color:#9ea3b1;
    display:block;
    margin-bottom:8px;
}

.input-group input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#1d2029;
    color:white;
    outline:none;
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#8b5cf6;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.login-btn:hover{
    opacity:.9;
}

.error{
    color:#ff6b6b;
    text-align:center;
    margin-top:15px;
}
</style>
</head>
<body>

<div class="login-box">

    <div class="logo">
        Photo<span>Batch</span>
    </div>

    <div class="input-group">
        <label>Tài khoản</label>
        <input type="text" id="username">
    </div>

    <div class="input-group">
        <label>Mật khẩu</label>
        <input type="password" id="password">
    </div>

    <button class="login-btn" onclick="login()">
        Đăng nhập
    </button>

    <div class="error" id="error"></div>

</div>

<script>
function login(){

    const username =
        document.getElementById('username').value;

    const password =
        document.getElementById('password').value;

    if(
        username === 'admin' &&
        password === 'thanh677pro'
    ){

        localStorage.setItem(
            'isLoggedIn',
            'true'
        );

        window.location.href =
            'index.html';

    }
    else{

        document.getElementById('error')
        .innerText =
        'Sai tài khoản hoặc mật khẩu';

    }

}
</script>

</body>
</html>
